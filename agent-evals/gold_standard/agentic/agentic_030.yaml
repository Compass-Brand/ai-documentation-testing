task_id: agentic_030
type: agentic
question: "A developer reports that the @cached decorator is not invalidating entries when user records are updated through the CRUD operations. The caching layer uses Redis with a default TTL of 300 seconds, but stale user data persists even after explicit updates. Investigate the interaction between the CacheConfig and the UserModel CRUD operations, and implement a cache invalidation strategy that clears relevant cache entries when user data changes."
